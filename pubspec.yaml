name: grow
description: "Grow~ by IdeaLab — Innovation Lab Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management — pinned to 2.x to avoid breaking 3.x API changes
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^17.2.3

  # Backend — latest stable Supabase
  supabase_flutter: ^2.9.1

  # Firebase — updated to latest stable (v4/v16 series)
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0

  # QR — updated to 6.x for Android 35 / Gradle 8 compat
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Notifications — updated to 21.x (required for AGP 8.x)
  flutter_local_notifications: ^21.0.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  dio: ^5.9.0
  url_launcher: ^6.3.1
  google_sign_in: ^6.2.1
  flutter_image_compress: ^2.1.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  timeago: ^3.7.0
  uuid: ^4.5.1
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  riverpod_generator: ^2.6.5
  build_runner: ^2.4.0
  flutter_lints: ^6.0.0
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
