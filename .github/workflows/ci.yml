name: Grow~ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0' # Matches your environment
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Static Analysis
        run: flutter analyze

      - name: Run Tests
        run: flutter test

      - name: Build APK (Check)
        run: flutter build apk --release --no-codesign
        # Note: We don't sign or upload here, just verify it builds in a clean environment.
