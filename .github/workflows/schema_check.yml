name: Schema Contract Check

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  schema-contract:
    name: Verify Schema Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for known invalid columns
        run: |
          echo "Checking for removed columns referenced in code..."
          
          # List of columns that were removed or never existed in production
          INVALID_COLUMNS=(
            "system_role"
            "base_role" 
            "duration_minutes"
            "cover_image_url"
            "interests"
            "show_github_graph"
            "is_blocked"
            "action_url"
            "full_name"
            "start_time"
            "end_time"
            "location_name"
          )
          
          FAILED=0
          for col in "${INVALID_COLUMNS[@]}"; do
            # Search dart files for Supabase queries using this column
            # Only flag if it appears inside a .select() or .insert() or .update() context
            if grep -rn "'$col'" grow/lib/ --include="*.dart" | \
               grep -E "\.select\(|\.insert\(|\.update\(|'$col'" | \
               grep -v "//"; then
              echo "❌ DRIFT DETECTED: '$col' found in code but not in production schema"
              FAILED=1
            fi
          done
          
          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "Schema drift detected. Check docs/database_contract.md"
            echo "for the correct column names before pushing."
            exit 1
          fi
          
          echo "✅ No schema drift detected"
      
      - name: Check booking status values
        run: |
          echo "Checking booking status enum values..."
          
          INVALID_STATUSES=("'active'" "'published'" "'in_progress'")
          # Note: check only in event/project/booking contexts
          FAILED=0
          
          # Events must use: upcoming, ongoing, completed, cancelled
          if grep -rn "'published'" grow/lib/features/events/ --include="*.dart" | \
             grep -v "//"; then
            echo "❌ Invalid event status 'published' found — use 'upcoming'"
            FAILED=1
          fi
          
          if grep -rn "'active'" grow/lib/features/events/ --include="*.dart" | \
             grep -v "//"; then
            echo "❌ Invalid event status 'active' found — use 'upcoming' or 'ongoing'"
            FAILED=1
          fi
          
          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "✅ Status enum values look correct"

      - name: Verify database_contract.md exists and is not empty
        run: |
          if [ ! -f "docs/database_contract.md" ]; then
            echo "❌ docs/database_contract.md is missing"
            exit 1
          fi
          
          lines=$(wc -l < docs/database_contract.md)
          if [ "$lines" -lt 20 ]; then
            echo "❌ docs/database_contract.md seems too short ($lines lines)"
            exit 1
          fi
          
          echo "✅ docs/database_contract.md exists and has $lines lines"
